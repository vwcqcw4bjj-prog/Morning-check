name: Generate pipeline.py

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fix pipeline.py encoding
        run: |
          python3 -c "
          src = open('pipeline.py', encoding='utf-8').read()
          bad = {
              '\u201c': '\"',
              '\u201d': '\"',
              '\u2018': \"'\",
              '\u2019': \"'\",
              '\u2014': '-',
              '\u2013': '-',
          }
          for b, g in bad.items():
              src = src.replace(b, g)
          open('pipeline.py', 'w', encoding='utf-8').write(src)
          import ast
          ast.parse(src)
          print('OK')
          "

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline.py
          git diff --staged --quiet || git commit -m "Fix pipeline.py encoding"
          git push
