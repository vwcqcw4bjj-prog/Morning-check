name: Generate pipeline.py

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install nbconvert jupyter

      - name: Rebuild pipeline.py from fix.py
        run: python3 fix.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline.py
          git diff --staged --quiet || git commit -m "Rebuild pipeline.py"
          git push
